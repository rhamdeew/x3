# Mode: standalone Xray (production)
# Usage: make xray
services:
  relay:
    build:
      context: ./docker/relay
      args:
        PROCESS_NAME: ${PROCESS_NAME:-nginx}
    image: x3-relay:latest
    container_name: relay
    volumes:
      - ./db/:/etc/x-ui/
      - ./cert/:/root/cert/
    command: ["run", "-c", "/etc/x-ui/xray_config.json"]
    cap_add:
      - NET_BIND_SERVICE
    user: "0"
    network_mode: host
    restart: unless-stopped
