# Mode: panel (3x-ui for configuration)
# Usage: make panel
services:
  overseer:
    build:
      context: ./docker/panel
      args:
        PROCESS_NAME: ${PROCESS_NAME:-nginx}
    image: x3-panel:latest
    container_name: overseer
    volumes:
      - ./db/:/etc/x-ui/
      - ./cert/:/root/cert/
      - ./scripts/:/scripts/
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
      XUI_ENABLE_FAIL2BAN: "true"
    tty: true
    network_mode: host
    restart: unless-stopped
